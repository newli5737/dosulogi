server {
    listen 80;
    server_name logi.dosutech.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name logi.dosutech.site;

    ssl_certificate     /etc/letsencrypt/live/api-logi.dosutech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-logi.dosutech.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /home/dosulogi/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
